<!DOCTYPE html>
<html lang="id">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>SPPG Tel Aviv</title>

  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;600;700&display=swap" rel="stylesheet">

  <style>
    *{margin:0;padding:0;box-sizing:border-box;font-family:'Inter',sans-serif}
    body{background:#0b0f1a;color:#e5e7eb}

    header{
      height:100vh;
      display:flex;
      flex-direction:column;
      justify-content:center;
      align-items:center;
      text-align:center;
      background: radial-gradient(circle at top, #1e3a8a, #020617);
      padding:20px;
    }

    .logo{width:150px;margin-bottom:20px}

    .main-title{
      font-size:2rem;font-weight:700;
      background:linear-gradient(90deg,#60a5fa,#22d3ee);
      -webkit-background-clip:text;color:transparent
    }

    .main-title2{
      font-size:3rem;font-weight:700;
      background:linear-gradient(90deg,#60a5fa,#22d3ee);
      -webkit-background-clip:text;color:transparent
    }

    header p{margin-top:15px;max-width:700px;opacity:.8}

    .section-title{
      text-align:center;
      font-size:1.8rem;
      margin:40px 0 20px;
      color:#22d3ee;
    }

    .banner-slider {
      width: 90%;
      height: 350px;
      margin: auto;
      overflow: hidden;
      position: relative;
      border-radius: 15px;
      touch-action: pan-y;
    }

    .banner-track {
      display: flex;
      width: 700%;
      height: 100%;
      transition: transform 0.5s ease-in-out;
    }

    .banner-slide {
      flex: 0 0 100%;
      background-size: 100% auto;
      background-position: center;
      background-repeat: no-repeat;
    }

    .banner-overlay {
      position: absolute;
      width: 100%;
      height: 100%;
      background: linear-gradient(to right, rgba(0,0,0,0.4), transparent);
    }

    .dots {
      position: absolute;
      bottom: 15px;
      width: 100%;
      text-align: center;
    }

    .dot {
      display: inline-block;
      width: 10px;
      height: 10px;
      margin: 5px;
      background: rgba(255,255,255,0.5);
      border-radius: 50%;
      cursor: pointer;
      transition: 0.3s;
    }

    .dot.active {
      background: #22d3ee;
      transform: scale(1.3);
    }

    footer{
      text-align:center;
      padding:40px;
      color:#64748b;
    }
  </style>
</head>
<body>

<header>
  <img src="https://i.ibb.co.com/N2k3jxKW/1775128468927.png" class="logo">

  <h1 class="main-title">Satuan Pemenuhan Pelayanan Gizi</h1>
  <p class="main-title">Cabang</p>
  <br>
  <h1 class="main-title2">Tel Aviv</h1>
  
  <p>
    Mohon doa & restu, pembangunan SPPG 6767 Cabang Tel Aviv sedang dalam tahap
    pengembangan dan pembangunan.
  </p>
</header>

<h2 class="section-title">Dokumentasi Pembangunan</h2>

<div class="banner-slider" id="slider">
  <div class="banner-track" id="bannerTrack">

    <!-- GANTI GAMBAR -->
<div class="banner-slide" style="background-image:url('https://i.ibb.co.com/zVLZR2T0/11d610ad-40d9-469c-9f40-d438892cc444.png')"></div>



    <div class="banner-slide" style="background-image:url('img2.jpg')"></div>
    <div class="banner-slide" style="background-image:url('img3.jpg')"></div>
    <div class="banner-slide" style="background-image:url('img4.jpg')"></div>
    <div class="banner-slide" style="background-image:url('img5.jpg')"></div>
    <div class="banner-slide" style="background-image:url('img6.jpg')"></div>
    <div class="banner-slide" style="background-image:url('img7.jpg')"></div>

  </div>

  <div class="banner-overlay"></div>
  <div class="dots" id="dots"></div>
</div>

<footer>
  © 2026 - SPPG 6767 Cabang Tel Aviv
</footer>

<script>
let bannerIndex = 0;
const bannerTrack = document.getElementById("bannerTrack");
const dotsContainer = document.getElementById("dots");
const totalBanner = 7;

/* DOT */
for(let i=0;i<totalBanner;i++){
  const dot = document.createElement("span");
  dot.classList.add("dot");
  if(i===0) dot.classList.add("active");

  dot.onclick = () => {
    bannerIndex = i;
    updateSlider();
  };

  dotsContainer.appendChild(dot);
}

const dots = document.querySelectorAll(".dot");

function updateSlider(){
  bannerTrack.style.transform = `translateX(-${bannerIndex * 100}%)`;
  dots.forEach(d=>d.classList.remove("active"));
  dots[bannerIndex].classList.add("active");
}

/* AUTO */
setInterval(()=>{
  bannerIndex = (bannerIndex+1)%totalBanner;
  updateSlider();
},5000);

/* ===== SWIPE SUPPORT ===== */
let startX = 0;
let endX = 0;

const slider = document.getElementById("slider");

slider.addEventListener("touchstart", e => {
  startX = e.touches[0].clientX;
});

slider.addEventListener("touchmove", e => {
  endX = e.touches[0].clientX;
});

slider.addEventListener("touchend", () => {
  let diff = startX - endX;

  if(Math.abs(diff) > 50){
    if(diff > 0){
      // swipe kiri
      bannerIndex = (bannerIndex + 1) % totalBanner;
    } else {
      // swipe kanan
      bannerIndex = (bannerIndex - 1 + totalBanner) % totalBanner;
    }
    updateSlider();
  }
});
</script>

</body>
</html>
